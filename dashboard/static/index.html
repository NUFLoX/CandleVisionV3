<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CandleVision Control Center</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top left, #1e293b 0, #020617 42%, #020617 100%);
      color: #e5e7eb;
    }
    .wrap { max-width: 1500px; margin: 0 auto; padding: 24px; }
    .top { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
    h1 { margin: 0; font-size: 34px; }
    h2 { margin: 0 0 14px; font-size: 18px; }
    .muted { color: #94a3b8; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; margin-top: 18px; }
    .card {
      background: rgba(15, 23, 42, .82);
      border: 1px solid rgba(148, 163, 184, .18);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,.25);
      overflow: auto;
    }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }
    .span-6 { grid-column: span 6; }
    .span-8 { grid-column: span 8; }
    .span-12 { grid-column: span 12; }
    @media (max-width: 1000px) { .span-3,.span-4,.span-6,.span-8 { grid-column: span 12; } }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      border: 1px solid rgba(148, 163, 184, .25);
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(30, 41, 59, .8);
      font-size: 12px;
      font-weight: 700;
    }
    .green { color: #86efac; border-color: rgba(34,197,94,.35); }
    .red { color: #fca5a5; border-color: rgba(239,68,68,.35); }
    .amber { color: #fcd34d; border-color: rgba(245,158,11,.35); }
    .blue { color: #93c5fd; border-color: rgba(59,130,246,.35); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { border-bottom: 1px solid rgba(148, 163, 184, .14); padding: 8px 7px; text-align: left; white-space: nowrap; }
    th { color: #93c5fd; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    tr:hover td { background: rgba(59,130,246,.07); }
    .num { font-variant-numeric: tabular-nums; }
    .ok { color: #86efac; }
    .warn { color: #fcd34d; }
    .loss { color: #fca5a5; }
    .boxrow { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .metric { background: rgba(30,41,59,.72); border: 1px solid rgba(148,163,184,.14); border-radius: 14px; padding: 12px; }
    .metric .label { color: #94a3b8; font-size: 12px; }
    .metric .value { font-size: 22px; font-weight: 900; margin-top: 5px; }
    .error { color: #fca5a5; white-space: pre-wrap; font-size: 12px; }
    button {
      background: #2563eb;
      color: white;
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="muted">CandleVision V3</div>
        <h1>Control Center</h1>
        <div class="muted" id="updated">loading...</div>
      </div>
      <div>
        <button onclick="loadAll()">Refresh</button>
      </div>
    </div>

    <div id="errors" class="error"></div>

    <div class="grid">
      <section class="card span-12">
        <h2>Status</h2>
        <div class="badges" id="statusBadges"></div>
      </section>

      <section class="card span-12">
        <h2>Executor Summary</h2>
        <div class="boxrow" id="executorSummary"></div>
      </section>

      <section class="card span-12">
        <h2>Active Executor Trades</h2>
        <div id="activeTrades"></div>
      </section>

      <section class="card span-6">
        <h2>Closed Trades</h2>
        <div id="closedTrades"></div>
      </section>

      <section class="card span-6">
        <h2>Exit Reasons</h2>
        <div id="exitReasons"></div>
      </section>

      <section class="card span-6">
        <h2>Signal Kind Groups</h2>
        <div id="kindGroups"></div>
      </section>

      <section class="card span-6">
        <h2>Setup Performance by Kind</h2>
        <div id="setupKind"></div>
      </section>

      <section class="card span-6">
        <h2>Setup Performance by Timeframe</h2>
        <div id="setupTf"></div>
      </section>

      <section class="card span-6">
        <h2>Latest Signals</h2>
        <div id="signals"></div>
      </section>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);

function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function n(v, d = 4) {
  if (v === null || v === undefined || v === '') return '-';
  const x = Number(v);
  if (!Number.isFinite(x)) return esc(v);
  return x.toFixed(d);
}

async function api(path) {
  const r = await fetch(path, { cache: 'no-store' });
  if (!r.ok) throw new Error(path + ' HTTP ' + r.status);
  return await r.json();
}

function badgeTone(value) {
  const t = String(value || '').toLowerCase();
  if (t.includes('ok') || t.includes('online') || t.includes('public-ok')) return 'green';
  if (t.includes('error') || t.includes('stale')) return 'red';
  if (t.includes('not-configured') || t.includes('standby')) return 'amber';
  return 'blue';
}

function renderStatus(status) {
  const keys = ['scanner','executor','telegram','x_delivery','bybit_api','database','redis','rate_limit','open_trades','closed_trades_today','last_scan_seconds'];
  $('statusBadges').innerHTML = keys.map(k => {
    const v = status?.[k];
    return `<span class="badge ${badgeTone(v)}">${esc(k)}: ${esc(v)}</span>`;
  }).join('');
}

function metric(label, value, cls='') {
  return `<div class="metric"><div class="label">${esc(label)}</div><div class="value ${cls}">${esc(value)}</div></div>`;
}

function renderSummary(ledger, active) {
  const s = ledger.summary || {};
  const a = active.summary || {};
  $('executorSummary').innerHTML = [
    metric('Open trades', s.total_open_trades ?? a.total_open_trades ?? 0, 'ok'),
    metric('Closed trades', s.total_closed_trades ?? 0),
    metric('Win rate', n((s.win_rate ?? 0) * 100, 2) + '%', 'ok'),
    metric('Net R', n(s.net_r ?? 0, 4), Number(s.net_r || 0) >= 0 ? 'ok' : 'loss'),
  ].join('');
}

function table(rows, cols, limit=50) {
  if (!Array.isArray(rows) || rows.length === 0) return '<div class="muted">No data</div>';
  const head = cols.map(c => `<th>${esc(c.label || c.key)}</th>`).join('');
  const body = rows.slice(0, limit).map(row => {
    return '<tr>' + cols.map(c => {
      const raw = typeof c.value === 'function' ? c.value(row) : row[c.key];
      return `<td class="${c.cls || ''}">${raw === undefined || raw === null ? '-' : esc(raw)}</td>`;
    }).join('') + '</tr>';
  }).join('');
  return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}

function renderActiveTrades(active) {
  $('activeTrades').innerHTML = table(active.rows || [], [
    {key:'symbol', label:'Symbol'},
    {key:'side', label:'Side'},
    {key:'timeframe', label:'TF'},
    {key:'signal_kind', label:'Kind'},
    {key:'state', label:'State'},
    {key:'entry_price', label:'Entry', value:r=>n(r.entry_price, 6), cls:'num'},
    {key:'current_sl', label:'SL', value:r=>n(r.current_sl, 6), cls:'num'},
    {key:'max_gain_r', label:'Max R', value:r=>n(r.max_gain_r, 4), cls:'num'},
    {key:'max_drawdown_r', label:'DD R', value:r=>n(r.max_drawdown_r, 4), cls:'num'},
    {key:'updated_at', label:'Updated'}
  ], 80);
}

function renderLedger(ledger) {
  $('closedTrades').innerHTML = table(ledger.closed_trades || [], [
    {key:'symbol', label:'Symbol'},
    {key:'side', label:'Side'},
    {key:'timeframe', label:'TF'},
    {key:'signal_kind', label:'Kind'},
    {key:'exit_reason', label:'Exit'},
    {key:'r_result', label:'R', value:r=>n(r.r_result, 4), cls:'num'},
    {key:'exit_time', label:'Exit time'}
  ], 40);

  $('exitReasons').innerHTML = table(ledger.exit_reasons || [], [
    {key:'exit_reason', label:'Reason'},
    {key:'total', label:'N', cls:'num'},
    {key:'wins', label:'Wins', cls:'num'},
    {key:'losses', label:'Losses', cls:'num'},
    {key:'net_r', label:'Net R', value:r=>n(r.net_r, 4), cls:'num'},
    {key:'avg_r', label:'Avg R', value:r=>n(r.avg_r, 4), cls:'num'}
  ], 40);
}

function renderKinds(groups) {
  $('kindGroups').innerHTML = table(groups.groups || [], [
    {key:'kind', label:'Kind'},
    {key:'timeframe', label:'TF'},
    {key:'signal_focus_group', label:'Focus'},
    {key:'total', label:'Total', cls:'num'},
    {key:'confirmed', label:'Confirmed', cls:'num'},
    {key:'avg_score_last', label:'Avg score', value:r=>n(r.avg_score_last, 2), cls:'num'},
    {key:'recommended_management', label:'Management'}
  ], 80);
}

function renderSetup(perf) {
  $('setupKind').innerHTML = table(perf.by_kind || [], [
    {key:'kind', label:'Kind'},
    {key:'total', label:'Total', cls:'num'},
    {key:'tp', label:'TP', cls:'num'},
    {key:'sl', label:'SL', cls:'num'},
    {key:'pending', label:'Pending', cls:'num'},
    {key:'win_rate', label:'WR %', value:r=>n(r.win_rate, 2), cls:'num'},
    {key:'avg_mfe', label:'MFE', value:r=>n(r.avg_mfe, 4), cls:'num'},
    {key:'avg_mae', label:'MAE', value:r=>n(r.avg_mae, 4), cls:'num'}
  ], 80);

  $('setupTf').innerHTML = table(perf.by_timeframe || [], [
    {key:'timeframe', label:'TF'},
    {key:'total', label:'Total', cls:'num'},
    {key:'tp', label:'TP', cls:'num'},
    {key:'sl', label:'SL', cls:'num'},
    {key:'pending', label:'Pending', cls:'num'},
    {key:'win_rate', label:'WR %', value:r=>n(r.win_rate, 2), cls:'num'},
    {key:'avg_mfe', label:'MFE', value:r=>n(r.avg_mfe, 4), cls:'num'},
    {key:'avg_mae', label:'MAE', value:r=>n(r.avg_mae, 4), cls:'num'}
  ], 20);
}

function renderSignals(snapshot) {
  $('signals').innerHTML = table(snapshot.signals || [], [
    {key:'symbol', label:'Symbol'},
    {key:'side', label:'Side'},
    {key:'timeframe', label:'TF'},
    {key:'kind', label:'Kind'},
    {key:'status', label:'Status'},
    {key:'score', label:'Score', value:r=>n(r.score, 2), cls:'num'},
    {key:'entry', label:'Entry', value:r=>n(r.entry, 6), cls:'num'}
  ], 80);
}

async function loadAll() {
  const errors = [];
  $('updated').textContent = 'loading...';
  try {
    const [status, snapshot, active, ledger, setupPerf, kindGroups] = await Promise.all([
      api('/api/status').catch(e => (errors.push(e.message), {})),
      api('/api/snapshot').catch(e => (errors.push(e.message), {signals:[]})),
      api('/api/executor-active-trades?limit=200').catch(e => (errors.push(e.message), {rows:[],summary:{}})),
      api('/api/executor-ledger?limit=80').catch(e => (errors.push(e.message), {summary:{},open_trades:[],closed_trades:[],exit_reasons:[]})),
      api('/api/setup-performance').catch(e => (errors.push(e.message), {by_kind:[],by_timeframe:[]})),
      api('/api/signal-kind-groups').catch(e => (errors.push(e.message), {groups:[]})),
    ]);

    renderStatus(status);
    renderSummary(ledger, active);
    renderActiveTrades(active);
    renderLedger(ledger);
    renderKinds(kindGroups);
    renderSetup(setupPerf);
    renderSignals(snapshot);

    $('errors').textContent = errors.length ? errors.join('\n') : '';
    $('updated').textContent = 'updated: ' + new Date().toLocaleString();
  } catch (e) {
    $('errors').textContent = e.stack || e.message || String(e);
  }
}

loadAll();
setInterval(loadAll, 15000);
</script>
</body>
</html>
